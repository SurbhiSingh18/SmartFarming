<!DOCTYPE html>
<html>
<head>
    <title>Smart Farming Dashboard</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("farm.png") no-repeat center center/cover;
            font-family: Arial;
        }

        h2 {
            color: #e2e8e2;
        }

        input, button {
            margin: 5px;
            padding: 8px;
        }

        button {
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1b5e20;
        }

        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .input-group label {
            width: 120px;
            font-weight: bold;
        }

        .input-group input {
            flex: 1;
        }

        #container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        #bar {
            width: 100%;
            height: 20px;
            background: #ccc;
            border-radius: 10px;
            margin-top: 10px;
        }

        #fill {
            height: 20px;
            background: rgb(23, 193, 23);
            width: 0%;
            border-radius: 10px;
        }

        #chatbox {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 10px;
            background: #f9f9f9;
        }

        #container h2,
        #container h3,
        #container label,
        #container p {
            color: #ffffff;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.7);
        }
    </style>
</head>

<body>

<div id="container">

<h2>🌱 Smart Farming Dashboard</h2>

<h3>Enter Sensor Data</h3>

<div class="input-group">
    <label>Moisture:</label>
    <input type="number" id="moisture">
</div>

<div class="input-group">
    <label>Temperature:</label>
    <input type="number" id="temperature">
</div>

<!-- ✅ IMPORTANT FIX -->
<button onclick="predict(event)">Check Irrigation</button>
<button onclick="loadData()">Load Live Data</button>

<h3 id="result"></h3>
<h4 id="status"></h4>

<div id="bar">
    <div id="fill"></div>
</div>

<hr>

<h3>💬 Chatbot</h3>

<div id="chatbox">
    <input type="text" id="query" placeholder="Ask something...">
    <button onclick="chat()">Ask</button>
    <p id="chatResponse"></p>
</div>

</div>

<script>

// 🚫 PREVENT ENTER KEY REFRESH (ONLY KEEP THIS ONE)
document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
    }
});

// 🔐 Predict (FINAL FIX)
let isLoading = false;

function predict(event) {

    event.preventDefault(); // 🔥 MAIN FIX (stops refresh)

    if(isLoading) return;
    isLoading = true;

    let moisture = document.getElementById("moisture").value;
    let temperature = document.getElementById("temperature").value;

    if(moisture === "" || temperature === "") {
        alert("Please enter both values!");
        isLoading = false;
        return;
    }

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-API-KEY": "12345"
        },
        body: JSON.stringify({
            username: localStorage.getItem("user"),
            moisture: Number(moisture),
            temperature: Number(temperature)
        })
    })
    .then(res => res.json())
    .then(data => {

        if(data.error){
            alert(data.error);
            isLoading = false;
            return;
        }

        document.getElementById("result").innerText =
            data.irrigation === "Yes"
            ? "💧 Irrigation Needed"
            : "🌿 No Irrigation Needed";

        document.getElementById("status").innerText =
            Number(moisture) < 40
            ? "⚠️ Soil is Dry"
            : "✅ Soil is Healthy";

        document.getElementById("fill").style.width = moisture + "%";

        isLoading = false;
    })
    .catch(err => {
        alert("Error connecting to backend");
        isLoading = false;
    });
}

// 🤖 Chatbot
function chat() {
    let query = document.getElementById("query").value;
    let moisture = document.getElementById("moisture").value;
    let temperature = document.getElementById("temperature").value;

    fetch("http://127.0.0.1:5000/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            query: query,
            moisture: parseInt(moisture),
            temperature: parseInt(temperature)
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("chatResponse").innerText = data.reply;
    });
}

// ☁️ Load data
function loadData() {
    fetch("https://api.thingspeak.com/channels/3339987/feeds/last.json")
    .then(res => res.json())
    .then(data => {
        document.getElementById("moisture").value = data.field1;
        document.getElementById("temperature").value = data.field2;
    });
}

</script>

</body>
</html>
