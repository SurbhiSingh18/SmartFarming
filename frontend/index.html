<!DOCTYPE html>
<html>
<head>
    <title>Smart Farming Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;   /* horizontal center */
            align-items: center;       /* vertical center */
            background: linear-gradient(to right, #d4fc79, #96e6a1);
        }

        h2 {
            color: #2e7d32;
        }

        input, button {
            margin: 5px;
            padding: 8px;
        }

        button {
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1b5e20;
        }

        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .input-group label {
            width: 120px;
            font-weight: bold;
        }

        .input-group input {
            flex: 1;
        }

        #container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        #bar {
            width: 100%;
            height: 20px;
            background: #ccc;
            border-radius: 10px;
            margin-top: 10px;
        }

        #fill {
            height: 20px;
            background: green;
            width: 0%;
            border-radius: 10px;
        }

        #chatbox {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 10px;
            background: #f9f9f9;
        }


    </style>
</head>

<body>

<div id="container">

<h2>🌱 Smart Farming Dashboard</h2>

<h3>Enter Sensor Data</h3>

<div class="input-group">
    <label>Moisture:</label>
    <input type="number" id="moisture">
</div>

<div class="input-group">
    <label>Temperature:</label>
    <input type="number" id="temperature">
</div>

<button onclick="predict()">Check Irrigation</button>
<button onclick="loadData()">Load Live Data</button>

<h3 id="result"></h3>

<h4 id="status"></h4>

<!-- Moisture Bar -->
<div id="bar">
    <div id="fill"></div>
</div>

<hr>

<h3>💬 Chatbot</h3>

<div id="chatbox">
    <input type="text" id="query" placeholder="Ask something...">
    <button onclick="chat()">Ask</button>
    <p id="chatResponse"></p>
</div>

</div>

<script>

// 🔐 Predict with API Key
function predict() {
    let moisture = document.getElementById("moisture").value;
    let temperature = document.getElementById("temperature").value;

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-API-KEY": "12345"
        },
        body: JSON.stringify({
            moisture: parseInt(moisture),
            temperature: parseInt(temperature)
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.error){
            document.getElementById("result").innerText = data.error;
        } else {
            document.getElementById("result").innerText =
                data.irrigation === "Yes"
                ? "💧 Irrigation Needed"
                : "🌿 No Irrigation Needed";
        }

        // 🌡️ Status Indicator
        if(moisture < 40) {
            document.getElementById("status").innerText = "⚠️ Soil is Dry";
        } else {
            document.getElementById("status").innerText = "✅ Soil is Healthy";
        }

        // 💧 Moisture Bar
        document.getElementById("fill").style.width = moisture + "%";
    })
    .catch(err => {
        document.getElementById("result").innerText = "Error connecting to backend";
    });
}

// 🤖 Chatbot (unchanged logic)
function chat() {
    let query = document.getElementById("query").value.toLowerCase();

    let moisture = document.getElementById("moisture").value;
    let temperature = document.getElementById("temperature").value;

    if(query.includes("water")) {
        if(moisture < 40)
            document.getElementById("chatResponse").innerText =
                "Soil moisture is low → Irrigation required";
        else
            document.getElementById("chatResponse").innerText =
                "Soil moisture is sufficient → No irrigation needed";
    }
    else if(query.includes("temperature")) {
        document.getElementById("chatResponse").innerText =
            "Temperature is " + temperature + "°C";
    }
    else if(query.includes("moisture")) {
        document.getElementById("chatResponse").innerText =
            "Soil moisture is " + moisture;
    }
    else {
        document.getElementById("chatResponse").innerText =
            "Sorry, I didn't understand.";
    }
}

// ☁️ Load data from ThingSpeak (unchanged logic)
function loadData() {
    fetch("https://api.thingspeak.com/channels/3339987/feeds/last.json")
    .then(res => res.json())
    .then(data => {
        document.getElementById("moisture").value = data.field1;
        document.getElementById("temperature").value = data.field2;
    })
    .catch(err => {
        alert("Error fetching data from cloud");
    });
}

</script>

</body>
</html>
