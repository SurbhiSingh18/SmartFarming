<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Smart Farming Dashboard</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("farm.png") no-repeat center center/cover;
            font-family: Arial;
        }

        h2 {
            color: #e2e8e2;
        }

        input, button {
            margin: 5px;
            padding: 8px;
        }

        button {
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1b5e20;
        }

        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .input-group label {
            width: 120px;
            font-weight: bold;
        }

        .input-group input {
            flex: 1;
        }

        #container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        #bar {
            width: 100%;
            height: 20px;
            background: #ccc;
            border-radius: 10px;
            margin-top: 10px;
        }

        #fill {
            height: 20px;
            background: rgb(23, 193, 23);
            width: 0%;
            border-radius: 10px;
        }

        #chatbox {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.95);
            color: rgb(35, 47, 187);
        }

        #historyTable {
            width: 100%;
            margin-top: 10px;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.6); /* darker background */
            color: white;
            border-radius: 8px;
            overflow: hidden;
        }

        #historyTable th {
            background: #2e7d32;
            color: white;
            padding: 8px;
        }

        #historyTable td {
            padding: 6px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        #chart {
            background: rgba(255, 255, 255, 0.85); /* white background */
            border-radius: 10px;
            margin-top: 10px;
            padding: 10px;
        }
        
        .main-layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            padding: 20px;
        }

/* Graph box on right side */
        .graph-box {
            width: 420px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .graph-box h3 {
            color: white;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.7);
        }

/* Fix chart size */
        #chart {
            width: 100%;
            height: 300px;
        }

        #container h2,
        #container h3,
        #container label,
        #container p {
            color: #ffffff;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.7);
        }

        #chatbox,
        #chatbox p,
        #chatbox input {
            color: black !important;
        }
     
        .quick-questions {
            margin-top: 10px;
        }

        .quick-questions button {
            margin: 3px;
            padding: 5px 8px;
            font-size: 12px;
            background: #ffffff;
            color: #2e7d32;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .quick-questions button:hover {
            background: #d4f5d4;
        }

        #chatbox2 {
            height: 180px;
            overflow-y: auto;
            padding: 10px;
            background: #e5ddd5;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .message {
            max-width: 70%;
            padding: 8px;
            margin: 5px;
            border-radius: 10px;
            font-size: 14px;
            color: black;
        }

        .user {
            background: #dcf8c6;
            float: right;
            clear: both;
        }

        .bot {
            background: white;
            float: left;
            clear: both;
        }

    </style>
</head>

<body>

<div class="main-layout">
<div id="container">

<h2>🌱 Smart Farming Dashboard</h2>

<h3>Enter Sensor Data</h3>

<div class="input-group">
    <label>Moisture:</label>
    <input type="number" id="moisture">
</div>

<div class="input-group">
    <label>Temperature:</label>
    <input type="number" id="temperature">
</div>

<!-- ✅ IMPORTANT FIX -->
<button onclick="predict(event)">Check Irrigation</button>
<button onclick="loadData()">Load Live Data</button>

<h3 id="result"></h3>
<h4 id="status"></h4>

<div id="bar">
    <div id="fill"></div>
</div>

<hr>

<h3>💬 Chatbot</h3>
<div id="chatbox2"></div>

<input type="text" id="query2" placeholder="Ask something...">
<button onclick="chat2()">Send</button>
<button onclick="clearChat()">Clear</button>

<hr>

</div>

<div class="graph-box">

<h3>📊 Data History</h3>

<table id="historyTable">
    <tr>
        <th>Moisture</th>
        <th>Temp</th>
        <th>Time</th>
    </tr>
</table>

    <h3 style="margin-top:15px;">📈 Moisture Trend</h3>
    <canvas id="chart"></canvas>
</div>
</div>

<script>

// 🚫 Prevent Enter key refresh
document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
    }
});

// 📊 Store chart instance (IMPORTANT FIX)
let chartInstance;

// 🔐 Prevent multiple clicks
let isLoading = false;

// 🔐 Predict
function predict(event) {

    event.preventDefault();

    if(isLoading) return;
    isLoading = true;

    let moisture = document.getElementById("moisture").value;
    let temperature = document.getElementById("temperature").value;

    if(moisture === "" || temperature === "") {
        alert("Please enter both values!");
        isLoading = false;
        return;
    }

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-API-KEY": "12345"
        },
        body: JSON.stringify({
            username: localStorage.getItem("user"),
            moisture: Number(moisture),
            temperature: Number(temperature)
        })
    })
    .then(res => res.json())
    .then(data => {

        if(data.error){
            alert(data.error);
            isLoading = false;
            return;
        }

        // 🌱 Result
        document.getElementById("result").innerText =
            data.irrigation === "Yes"
            ? "💧 Irrigation Needed"
            : "🌿 No Irrigation Needed";

        // 📌 Status
        document.getElementById("status").innerText =
            Number(moisture) < 40
            ? "⚠️ Soil is Dry"
            : "✅ Soil is Healthy";

        // 📊 Progress bar
        document.getElementById("fill").style.width = moisture + "%";

        // 🔥 UPDATE HISTORY + GRAPH
        loadHistory();

        isLoading = false;
    })
    .catch(err => {
        alert("Error connecting to backend");
        isLoading = false;
    });
}

// 🤖 Chatbot
function chat() {
    let query = document.getElementById("query").value;
    let moisture = document.getElementById("moisture").value;
    let temperature = document.getElementById("temperature").value;

    fetch("http://127.0.0.1:5000/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            query: query,
            moisture: parseInt(moisture),
            temperature: parseInt(temperature)
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("chatResponse").innerText = data.reply;
    });
}

// ☁️ Load data from ThingSpeak
function loadData() {
    fetch("https://api.thingspeak.com/channels/3339987/feeds/last.json")
    .then(res => res.json())
    .then(data => {
        document.getElementById("moisture").value = data.field1;
        document.getElementById("temperature").value = data.field2;
    });
}

// 📊 Load History + Graph
function loadHistory() {
    fetch("http://127.0.0.1:5000/logs")
    .then(res => res.json())
    .then(data => {

        let table = document.getElementById("historyTable");

        // Reset table
        table.innerHTML = `
            <tr>
                <th>Moisture</th>
                <th>Temp</th>
                <th>Time</th>
            </tr>
        `;

        let last = data.slice(-5);

        let moistureData = [];
        let labels = [];

        last.forEach(item => {

            table.innerHTML += `
                <tr>
                    <td>${item.moisture}</td>
                    <td>${item.temperature}</td>
                    <td>${item.time}</td>
                </tr>
            `;

            moistureData.push(item.moisture);
            labels.push(item.time);
        });

        // 🔥 Destroy old chart
        if(chartInstance){
            chartInstance.destroy();
        }

        // 📈 Create new chart
        chartInstance = new Chart(document.getElementById("chart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "Moisture Trend",
                    data: moistureData,
                    borderWidth: 2,
                    tension: 0.3
                }]
            }
        });

    });
}

// 🚀 Load history on page load
loadHistory();

function askQuestion(q) {
    document.getElementById("query").value = q;
    chat();
}

const chatbox2 = document.getElementById("chatbox2");

function addMessage(msg, type){
    let div = document.createElement("div");
    div.classList.add("message", type);
    div.innerText = msg;
    chatbox2.appendChild(div);
    chatbox2.scrollTop = chatbox2.scrollHeight;
}

function chat2(){
    let q = document.getElementById("query2").value;
    let m = document.getElementById("moisture").value;
    let t = document.getElementById("temperature").value;

    if(q.trim() === ""){
        alert("Ask something!");
        return;
    }

    addMessage(q, "user");

    fetch("http://127.0.0.1:5000/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            query: q,
            moisture: Number(m || 0),
            temperature: Number(t || 0)
        })
    })
    .then(res => res.json())
    .then(data => {
        addMessage(data.reply, "bot");
    });

    document.getElementById("query2").value = "";
}

function clearChat(){
    chatbox2.innerHTML = "";
}

function quickAsk(q){
    document.getElementById("query2").value = q;
    chat2();
}

</script>

</body>
</html>
